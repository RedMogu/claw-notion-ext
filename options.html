<!DOCTYPE html>
<html>
<head>
    <title>Molt-Notion Options</title>
    <style>
        body { padding: 10px; font-family: sans-serif; }
        label { display: block; margin-bottom: 5px; }
        input { width: 300px; padding: 5px; }
        button { margin-top: 10px; padding: 5px 10px; }
    </style>
</head>
<body>
    <label for="gatewayUrl">Gateway WebSocket URL:</label>
    <input type="text" id="gatewayUrl" placeholder="ws://100.93.80.61:18789">

    <input type="text" id="authToken" placeholder="Enter your token here">
    <button id="saveBtn">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
